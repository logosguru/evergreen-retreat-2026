<!-- 매직링크 이메일 템플릿 (로컬 + 프로덕션 공용).
     서버사이드 확인 라우트 /auth/confirm 를 token_hash 방식으로 호출한다. -->
<h2>늘푸른교회 하계 수련회 — 등록 수정</h2>
<p>아래 버튼을 눌러 등록 정보를 수정하세요. 이 링크는 1시간 동안 유효합니다.</p>
<p>
  <a
    href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email&next=/edit/manage"
    style="display:inline-block;padding:10px 18px;background:#059669;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;"
  >
    등록 정보 수정하기
  </a>
</p>
<p style="color:#64748b;font-size:13px;">
  본인이 요청하지 않았다면 이 메일을 무시하셔도 됩니다.
</p>
